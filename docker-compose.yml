networks:
  ez-network:
    driver: bridge

services:
  backend:
    container_name: ez_backend
    build:
      dockerfile: ./Dockerfile
      context: backend
    networks:
      - ez-network

  nginx:
    image: nginx:stable-alpine3.23-slim
    container_name: ez_nginx
    ports:
      - 80:80
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - ez-network
