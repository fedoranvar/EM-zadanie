networks:
  appnet:
    driver: bridge

services:
  backend:
    container_name: ${BACKEND_CONTAINER_NAME:-backend}
    build:
      dockerfile: ./Dockerfile
      context: backend
    read_only: true
    networks:
      - appnet
    expose:
      - "8000"
    healthcheck:   
      test: ["CMD", "nc", "-z", "127.0.0.1", "8000"]  # nc -z = TCP scan
      interval: 5s
      timeout: 2s
      retries: 2
      start_period: 1s

  nginx:
    image: nginx:stable-alpine3.23-slim
    container_name: ${NGINX_CONTAINER_NAME:-nginx}
    ports:
      - 80:80
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - appnet
